name: Update Market Data

on:
  schedule:
    - cron: '0 12 * * 1-5'  # Mon-Fri at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/market-data.json
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u +%Y-%m-%d)"
          git push
